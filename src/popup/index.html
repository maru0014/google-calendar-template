<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テンプレート管理</title>
  <style>
    :root {
      --primary: #0b57d0;
      --primary-hover: #0a49b7;
      --surface: #fff;
      --bg: #f6f8fc;
      --border: #dadce0;
      --border-strong: #c4c7c5;
      --text: #1f1f1f;
      --text-sub: #5f6368;
      --text-faint: #80868b;
      --danger: #c5221f;
      --danger-bg: #fce8e6;
      --danger-border: #f5b5b3;
      --chip: #e8f0fe;
      --chip-text: #1967d2;
      --field: #fff;
      --hover: #f1f3f4;
      --on-primary: #fff;
      --radius: 12px;
      --shadow: 0 1px 2px rgba(60, 64, 67, .1), 0 1px 3px rgba(60, 64, 67, .08);
      --shadow-hover: 0 1px 3px rgba(60, 64, 67, .2), 0 4px 8px rgba(60, 64, 67, .12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #8ab4f8;
        --primary-hover: #aecbfa;
        --surface: #2d2e30;
        --bg: #202124;
        --border: #5f6368;
        --border-strong: #80868b;
        --text: #e8eaed;
        --text-sub: #9aa0a6;
        --text-faint: #80868b;
        --danger: #f28b82;
        --danger-bg: #3a2321;
        --danger-border: #5c3330;
        --chip: #1e3a5f;
        --chip-text: #8ab4f8;
        --field: #202124;
        --hover: #3c4043;
        --on-primary: #202124;
        --shadow: 0 1px 2px rgba(0, 0, 0, .3), 0 1px 3px rgba(0, 0, 0, .2);
        --shadow-hover: 0 1px 3px rgba(0, 0, 0, .4), 0 4px 8px rgba(0, 0, 0, .3);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 500px;
      min-height: 500px;
      max-height: 700px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 17px;
      margin: 0;
      color: var(--text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-sub);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: .15s;
    }

    .icon-btn:hover {
      background: var(--hover);
      border-color: var(--border-strong);
    }

    .icon-btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    .icon-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--on-primary);
    }

    .icon-btn.primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .content {
      padding: 14px;
      max-height: 620px;
      overflow-y: auto;
    }

    .template-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .template-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow);
      transition: .15s;
      position: relative;
    }

    .template-item:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--border-strong);
    }

    .template-item.dragging {
      opacity: 0.5;
    }

    .drag-handle {
      color: var(--border-strong);
      cursor: grab;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
      transition: .15s;
      user-select: none;
    }

    .template-item:hover .drag-handle {
      color: var(--text-faint);
    }

    .template-info {
      flex: 1;
      min-width: 0;
    }

    .template-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-sub);
      background: var(--hover);
      border-radius: 999px;
      padding: 3px 9px;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge svg {
      width: 12px;
      height: 12px;
      opacity: .7;
      flex-shrink: 0;
    }

    .badge.cal {
      background: var(--chip);
      color: var(--chip-text);
    }

    .template-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .mini {
      width: 32px;
      height: 32px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-sub);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: .15s;
    }

    .mini:hover {
      background: var(--hover);
    }

    .mini:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .mini svg {
      width: 16px;
      height: 16px;
    }

    .mini.delete:hover {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: var(--danger-border);
    }

    .list-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .empty-state-subtext {
      font-size: 12px;
      color: var(--text-faint);
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--surface);
      color: var(--text);
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .4);
      width: 460px;
      max-height: 86vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      border-radius: 6px;
    }

    .modal-close:hover {
      background: var(--hover);
    }

    .modal-close:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    #template-form {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .modal-body {
      padding: 16px 20px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .section {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      margin: 4px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .section:not(:first-child) {
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .grid .form-group {
      margin-bottom: 0;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .req {
      color: var(--danger);
    }

    .form-group input[type="text"],
    .form-group input[type="number"],
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: var(--field);
      color: var(--text);
    }

    .form-group textarea {
      min-height: 64px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary) 25%, transparent);
    }

    /* 変数チップ */
    .vars-label {
      font-size: 11px;
      color: var(--text-sub);
      margin: 7px 0 4px;
    }

    .vars {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .var-chip {
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--chip);
      color: var(--chip-text);
      border: none;
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      transition: .12s;
    }

    .var-chip:hover {
      filter: brightness(.95);
    }

    .var-chip:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 1px;
    }

    /* 期間 サフィックス + クイック */
    .suffix-wrap {
      position: relative;
    }

    .suffix-wrap input {
      padding-right: 34px;
    }

    .suffix-wrap .suffix {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-sub);
      pointer-events: none;
    }

    .quick {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .quick button {
      font-size: 12px;
      color: var(--primary);
      background: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 10px;
      cursor: pointer;
      transition: .12s;
    }

    .quick button:hover {
      background: var(--chip);
    }

    .quick button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 1px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      margin: 0;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      margin: 0;
      cursor: pointer;
    }

    .modal-foot {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .modal-foot button {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-foot button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .modal-foot button.cancel {
      background: transparent;
      color: var(--primary);
    }

    .modal-foot button.cancel:hover {
      background: var(--chip);
    }

    .modal-foot button.save {
      background: var(--primary);
      color: var(--on-primary);
    }

    .modal-foot button.save:hover {
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📅 テンプレート管理</h1>
    <div class="actions">
      <button id="export-btn" class="icon-btn" aria-label="エクスポート" title="エクスポート">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 10v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 3v9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 7l4-4 4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="import-btn" class="icon-btn" aria-label="インポート" title="インポート">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 10v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 3v9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 8l-4 4-4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="create-btn" class="icon-btn primary" aria-label="新規作成" title="新規作成">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
          <path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/>
        </svg>
      </button>
      <input type="file" id="import-file" accept="application/json,.json" style="display:none" />
    </div>
  </div>

  <div class="content">
    <div id="empty-state" class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-text">テンプレートがありません</div>
      <div class="empty-state-subtext">「新規作成」ボタンから最初のテンプレートを作成しましょう</div>
    </div>

    <ul id="template-list" class="template-list" style="display: none;"></ul>
    <div id="list-hint" class="list-hint" style="display: none;">⠿ をドラッグして並べ替え</div>
  </div>

  <!-- モーダル -->
  <div id="modal" class="modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title">テンプレートを作成</h2>
        <button type="button" class="modal-close" id="modal-close-btn" aria-label="閉じる" title="閉じる">×</button>
      </div>

      <form id="template-form">
        <div class="modal-body">
          <div class="section">基本情報</div>

          <div class="form-group">
            <label for="template-name">テンプレート名 <span class="req">*</span></label>
            <input type="text" id="template-name" required>
          </div>

          <div class="form-group">
            <label for="template-title">タイトル <span class="req">*</span></label>
            <input type="text" id="template-title" required placeholder="例: チームミーティング">
            <div class="vars-label">クリックで変数を挿入：</div>
            <div class="vars" data-target="template-title"></div>
          </div>

          <div class="form-group">
            <label for="template-description">説明</label>
            <textarea id="template-description" placeholder="例: 週次のチーム定例会議"></textarea>
            <div class="vars-label">クリックで変数を挿入：</div>
            <div class="vars" data-target="template-description"></div>
          </div>

          <div class="section">詳細設定</div>

          <div class="grid">
            <div class="form-group">
              <label for="template-location">場所</label>
              <input type="text" id="template-location" placeholder="例: 会議室A">
            </div>
            <div class="form-group">
              <label for="template-calendarName">登録先カレンダー名</label>
              <input type="text" id="template-calendarName" placeholder="例: 仕事用">
            </div>
            <div class="form-group full">
              <label for="template-guests">ゲスト（カンマ区切り）</label>
              <input type="text" id="template-guests" placeholder="例: user1@example.com, user2@example.com">
            </div>
            <div class="form-group">
              <label for="template-duration">期間</label>
              <div class="suffix-wrap">
                <input type="number" id="template-duration" min="0" step="1" placeholder="例: 60">
                <span class="suffix">分</span>
              </div>
              <div class="quick">
                <button type="button" data-duration="15">15</button>
                <button type="button" data-duration="30">30</button>
                <button type="button" data-duration="60">60</button>
                <button type="button" data-duration="90">90</button>
              </div>
            </div>
            <div class="form-group checkbox-group">
              <label for="template-allDay">
                <input type="checkbox" id="template-allDay"> 終日イベント
              </label>
            </div>
          </div>
        </div>

        <div class="modal-foot">
          <button type="button" class="cancel" id="cancel-btn">キャンセル</button>
          <button type="submit" class="save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
